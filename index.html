<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Меморі гра</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/style.css" />
    <link
      rel="shortcut icon"
      href="./img/icons/icon.png"
      type="image/x-icon"
    />
  </head>
  <body>
    <div class="container">
      <h1>Меморі гра</h1>
      <div id="game-info">
        <div class="info-item">
          <span class="info-label">Час:</span>
          <span id="timer" class="info-value">60</span>
        </div>
        <div class="info-item">
          <span class="info-label">Бали:</span>
          <span id="score" class="info-value">0</span>
        </div>
        <div class="info-item">
          <span class="info-label">Рівень:</span>
          <span id="level" class="info-value">easy</span>
        </div>
      </div>
      <div id="game-board"></div>
      <div class="controls">
        <button id="start-btn">Почати гру</button>
        <button id="pause-btn" disabled>Пауза</button>
        <select id="level-select">
          <option value="easy">easy</option>
          <option value="medium">medium</option>
          <option value="hard">hard</option>
        </select>
      </div>
    </div>
    <script src="./js/index.js"></script>
  </body>
</html>
